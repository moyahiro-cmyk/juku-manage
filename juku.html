<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>塾の予定管理システム（塾長画面）</title>
    <style>
        body { font-family: sans-serif; margin: 20px; background-color: #f0f4f8; }
        h1 { color: #2c3e50; border-bottom: 2px solid #3498db; padding-bottom: 10px; }
        .box { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); max-width: 550px; margin-top: 15px; }
        select, input, button, textarea { padding: 10px; margin: 8px 0; width: 100%; box-sizing: border-box; border: 1px solid #ccc; border-radius: 4px; font-size: 1em; }
        textarea { resize: vertical; font-family: sans-serif; }
        button { background-color: #3498db; color: white; border: none; cursor: pointer; font-weight: bold; }
        button:hover { background-color: #2980b9; }
        
        .notify-btn { background-color: #3498db; }
        .urgent-btn { background-color: #e74c3c; }
        .urgent-btn:hover { background-color: #c0392b; }
        .clear-btn { background-color: #7f8c8d; margin-top: 30px; font-size: 0.9em; }
        label { font-size: 0.9em; color: #2c3e50; font-weight: bold; display: block; margin-top: 12px; }
        
        .inline-selects { display: flex; gap: 8px; align-items: center; margin: 8px 0; }
        .inline-selects select { margin: 0; flex: 1; }
        .inline-selects span { font-size: 0.9em; color: #555; font-weight: bold; }

        /* 3面切り替えタブ */
        .tab-container { display: flex; gap: 8px; max-width: 550px; margin-top: 15px; }
        .tab-btn { flex: 1; padding: 10px; background-color: #dcdde1; color: #2f3640; border-radius: 6px 6px 0 0; margin: 0; font-size: 0.9em; cursor: pointer; border: none; }
        .tab-btn.active { background-color: #3498db; color: white; }
        .tab-btn.urgent-tab.active { background-color: #e74c3c; }

        /* 管理用カレンダー */
        .calendar-header { display: flex; justify-content: space-between; align-items: center; font-weight: bold; margin-bottom: 10px; }
        .calendar-nav-btn { width: auto; padding: 4px 12px; margin: 0; background: #e0e0e0; color: #333; }
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; text-align: center; font-size: 0.85em; background: #fafafa; padding: 8px; border-radius: 8px; border: 1px solid #ddd; }
        .weekday { font-weight: bold; color: #7f8c8d; padding-bottom: 6px; }
        .sunday { color: #e74c3c; }
        .saturday { color: #3498db; }
        .calendar-day { padding: 8px 0; border-radius: 4px; cursor: pointer; position: relative; min-height: 35px; }
        .calendar-day:hover { background-color: #e2e2e2; }
        .calendar-day.has-event::after { content: '●'; font-size: 9px; position: absolute; bottom: 2px; left: 0; right: 0; color: #2980b9; text-align: center; }
        .calendar-day.selected { background-color: #ffeaa7; border: 1px solid #f1c40f; }
        .calendar-day.empty { cursor: default; background: none !important; }
        .day-detail-box { background: #f8f9fa; padding: 10px; margin-top: 10px; border-radius: 6px; border: 1px dashed #3498db; min-height: 50px; font-size: 0.9em; }
    </style>
</head>
<body>

    <h1>塾・生徒予定管理システム（塾長画面）</h1>

    <div class="tab-container">
        <button id="tab1" class="tab-btn active" onclick="switchTab(1)">📅 1. 授業予定の入力</button>
        <button id="tab2" class="tab-btn urgent-tab" onclick="switchTab(2)">🚨 2. 緊急連絡の入力</button>
        <button id="tab3" class="tab-btn" onclick="switchTab(3)">👁 3. カレンダー確認</button>
    </div>

    <!-- 1ページ目：授業予定の入力 -->
    <div id="page1" class="box">
        <h2>【個別】授業予定の登録</h2>
        
        <label>対象の生徒を指定:</label>
        <select id="studentSelect">
            <option value="佐藤 拓海">佐藤 拓海 くん</option>
            <option value="鈴木 結衣">鈴木 結衣 さん</option>
            <option value="高橋 蓮">高橋 蓮 くん</option>
            <option value="田中 葵">田中 葵 さん</option>
            <option value="渡辺 翔太">渡辺 翔太 くん</option>
        </select>

        <label>教科を選択:</label>
        <select id="subjectSelect">
            <option value="英語">英語</option>
            <option value="数学">数学</option>
            <option value="国語">国語</option>
            <option value="理科">理科</option>
            <option value="社会">社会</option>
            <option value="その他">その他（面談・イベント等）</option>
        </select>
        
        <label>日付を指定:</label>
        <div class="inline-selects">
            <select id="yearSelect"><option value="2026">2026</option><option value="2027">2027</option></select><span>年</span>
            <select id="monthSelect"></select><span>月</span>
            <select id="daySelect"></select><span>日</span>
        </div>

        <label>開始時刻を指定:</label>
        <div class="inline-selects">
            <select id="hourSelect"></select><span>時</span>
            <select id="minuteSelect"></select><span>分 〜</span>
        </div>
        
        <label>追加の連絡事項（あれば入力）:</label>
        <input type="text" id="scheduleText" placeholder="例：本日は単語テストから始めます">
        
        <button class="notify-btn" onclick="sendSchedule()">予定を登録する</button>
    </div>

    <!-- 2ページ目：緊急連絡の入力 -->
    <div id="page2" class="box" style="display: none;">
        <h2 style="color: #e74c3c;">【一斉/個別】緊急連絡の送信登録</h2>
        
        <label>通知を送る対象:</label>
        <select id="broadcastTarget">
            <option value="全員">全生徒の保護者（一斉通知）</option>
            <option value="佐藤 拓海">佐藤 拓海 くんの保護者のみ</option>
            <option value="鈴木 結衣">鈴木 結衣 さんの保護者のみ</option>
            <option value="高橋 蓮">高橋 蓮 くんの保護者のみ</option>
            <option value="田中 葵">田中 葵 さんの保護者のみ</option>
            <option value="渡辺 翔太">渡辺 翔太 くんの保護者のみ</option>
        </select>

        <label>緊急連絡の件名:</label>
        <input type="text" id="urgentTitle" placeholder="例：【重要】大雨にともなう休校のご案内">

        <label>連絡内容（本文）:</label>
        <textarea id="urgentBody" rows="4" placeholder="例：本日の指導は安全を最優先とし、すべてオンライン指導（ZOOM）に切り替えます。"></textarea>

        <button class="urgent-btn" onclick="sendUrgentBroadcast()">🚨 緊急連絡を登録する</button>
    </div>

    <!-- 3ページ目：管理用カレンダー -->
    <div id="page3" class="box" style="display: none;">
        <h2>生徒予定カレンダー（全体把握用）</h2>
        <label>表示する生徒で絞り込み:</label>
        <select id="calendarFilter" onchange="renderCalendar()">
            <option value="すべて">すべての生徒の予定を表示</option>
            <option value="佐藤 拓海">佐藤 拓海 くん</option>
            <option value="鈴木 結衣">鈴木 結衣 さん</option>
            <option value="高橋 蓮">高橋 蓮 くん</option>
            <option value="田中 葵">田中 葵 さん</option>
            <option value="渡辺 翔太">渡辺 翔太 くん</option>
        </select>

        <div class="calendar-header" style="margin-top:15px;">
            <button class="calendar-nav-btn" onclick="changeMonth(-1)">◀</button>
            <span id="calendarMonthTitle">2026年06月</span>
            <button class="calendar-nav-btn" onclick="changeMonth(1)">▶</button>
        </div>
        <div class="calendar-grid" id="calendarGrid"></div>
        <div class="day-detail-box" id="dayDetailBox">
            <p style="color:#777; margin:5px 0;">日付をタップすると、その日の予定リストが表示されます。</p>
        </div>
    </div>

    <div style="max-width:550px; text-align:right;">
        <button class="clear-btn" onclick="clearAllData()">⚠ データを完全リセット</button>
    </div>

    <script>
        let schedules = JSON.parse(localStorage.getItem('juku_final_schedules')) || [];
        let currentYear = 2026;
        let currentMonth = 5;

        function switchTab(pageNum) {
            document.getElementById('page1').style.display = pageNum === 1 ? 'block' : 'none';
            document.getElementById('page2').style.display = pageNum === 2 ? 'block' : 'none';
            document.getElementById('page3').style.display = pageNum === 3 ? 'block' : 'none';

            document.getElementById('tab1').classList.toggle('active', pageNum === 1);
            document.getElementById('tab2').classList.toggle('active', pageNum === 2);
            document.getElementById('tab3').classList.toggle('active', pageNum === 3);

            if (pageNum === 3) { renderCalendar(); }
        }

        function generateDropdowns() {
            const monthSel = document.getElementById('monthSelect');
            const daySel = document.getElementById('daySelect');
            const hourSel = document.getElementById('hourSelect');
            const minuteSel = document.getElementById('minuteSelect');
            const today = new Date();

            for (let i = 1; i <= 12; i++) {
                let opt = document.createElement('option');
                opt.value = String(i).padStart(2, '0'); opt.innerText = i;
                if (i === (today.getMonth() + 1)) opt.selected = true;
                monthSel.appendChild(opt);
            }
            for (let i = 1; i <= 31; i++) {
                let opt = document.createElement('option');
                opt.value = String(i).padStart(2, '0'); opt.innerText = i;
                if (i === today.getDate()) opt.selected = true;
                daySel.appendChild(opt);
            }
            for (let i = 0; i <= 23; i++) {
                let opt = document.createElement('option');
                opt.value = String(i).padStart(2, '0'); opt.innerText = i;
                if (i === 18) opt.selected = true;
                hourSel.appendChild(opt);
            }
            for (let i = 0; i < 60; i += 10) {
                let opt = document.createElement('option');
                opt.value = String(i).padStart(2, '0'); opt.innerText = String(i).padStart(2, '0');
                minuteSel.appendChild(opt);
            }
            currentYear = today.getFullYear();
            currentMonth = today.getMonth();
        }
        generateDropdowns();

        function sendSchedule() {
            const student = document.getElementById('studentSelect').value;
            const subject = document.getElementById('subjectSelect').value;
            const year = document.getElementById('yearSelect').value;
            const month = document.getElementById('monthSelect').value;
            const day = document.getElementById('daySelect').value;
            const hour = document.getElementById('hourSelect').value;
            const minute = document.getElementById('minuteSelect').value;
            const extraText = document.getElementById('scheduleText').value.trim();

            const dateStr = `${year}-${month}-${day}`;
            let finalMessage = `【${subject}】 ${hour}:${minute}〜 開始`;
            if (extraText) finalMessage += ` ｜ 連絡: ${extraText}`;

            schedules.push({ student, date: dateStr, text: finalMessage, type: 'normal' });
            localStorage.setItem('juku_final_schedules', JSON.stringify(schedules));

            document.getElementById('scheduleText').value = '';
            alert(`${student} くん/さんの予定を保存しました！`);
        }

        function sendUrgentBroadcast() {
            const target = document.getElementById('broadcastTarget').value;
            const title = document.getElementById('urgentTitle').value.trim();
            const body = document.getElementById('urgentBody').value.trim();

            if (!title || !body) {
                alert('件名と本文を入力してください！');
                return;
            }

            const today = new Date();
            const dateStr = `${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,'0')}-${String(today.getDate()).padStart(2,'0')}`;
            const fullUrgentMessage = `🚨【緊急連絡】${title}：${body}`;

            schedules.push({ student: target, date: dateStr, text: fullUrgentMessage, type: 'urgent' });
            localStorage.setItem('juku_final_schedules', JSON.stringify(schedules));

            document.getElementById('urgentTitle').value = '';
            document.getElementById('urgentBody').value = '';
            alert(`緊急連絡を登録しました！保護者画面に反映されます。`);
        }

        function renderCalendar() {
            const grid = document.getElementById('calendarGrid');
            const monthTitle = document.getElementById('calendarMonthTitle');
            const filter = document.getElementById('calendarFilter').value;
            
            monthTitle.innerText = `${currentYear}年${String(currentMonth + 1).padStart(2, '0')}月`;
            grid.innerHTML = '';

            const weekdays = ['日', '月', '火', '水', '木', '金', '土'];
            weekdays.forEach((w, idx) => {
                const div = document.createElement('div');
                div.className = `weekday ${idx===0?'sunday':''} ${idx===6?'saturday':''}`;
                div.innerText = w; grid.appendChild(div);
            });

            const firstDay = new Date(currentYear, currentMonth, 1).getDay();
            const totalDays = new Date(currentYear, currentMonth + 1, 0).getDate();

            for (let i = 0; i < firstDay; i++) {
                const div = document.createElement('div'); div.className = 'calendar-day empty'; grid.appendChild(div);
            }

            for (let day = 1; day <= totalDays; day++) {
                const div = document.createElement('div');
                div.className = 'calendar-day'; div.innerText = day;
                const dayOfWeek = new Date(currentYear, currentMonth, day).getDay();
                if (dayOfWeek === 0) div.classList.add('sunday');
                if (dayOfWeek === 6) div.classList.add('saturday');

                const dateStr = `${currentYear}-${String(currentMonth + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
                
                let targetEvents = schedules.filter(item => {
                    if (filter === 'すべて') return item.date === dateStr;
                    return item.date === dateStr && (item.student === filter || item.student === '全員');
                });

                if (targetEvents.length > 0) div.classList.add('has-event');

                div.onclick = () => {
                    document.querySelectorAll('.calendar-day').forEach(el => el.classList.remove('selected'));
                    div.classList.add('selected');
                    showDayDetail(dateStr, day, filter);
                };
                grid.appendChild(div);
            }
        }

        function showDayDetail(dateStr, dayNum, filter) {
            const detailBox = document.getElementById('dayDetailBox');
            let targetEvents = schedules.filter(item => {
                if (filter === 'すべて') return item.date === dateStr;
                return item.date === dateStr && (item.student === filter || item.student === '全員');
            });

            if (targetEvents.length === 0) {
                detailBox.innerHTML = `<strong>📅 ${currentMonth + 1}月${dayNum}日</strong><br><p style="color:#999; margin:5px 0;">この日の予定はありません。</p>`;
            } else {
                let html = `<strong>📅 ${currentMonth + 1}月${dayNum}日の予定リスト</strong><ul style="margin:5px 0 0 0; padding-left:0; max-height:150px; overflow-y:auto;">`;
                targetEvents.forEach(item => {
                    const isUrgent = item.type === 'urgent';
                    const nameTag = item.student === '全員' ? '【全員一斉】' : `【${item.student}】`;
                    html += `<li style="background:${isUrgent?'#ffeae6':'#e8f4fd'}; border-left:5px solid ${isUrgent?'#e74c3c':'#3498db'}; margin:4px 0; padding:6px; list-style:none; font-size:0.9em;"><strong>${nameTag}</strong> ${item.text}</li>`;
                });
                html += '</ul>';
                detailBox.innerHTML = html;
            }
        }

        function changeMonth(dir) {
            currentMonth += dir;
            if (currentMonth > 11) { currentMonth = 0; currentYear += 1; }
            else if (currentMonth < 0) { currentMonth = 11; currentYear -= 1; }
            renderCalendar();
            document.getElementById('dayDetailBox').innerHTML = '<p style="color:#777; margin:5px 0;">日付をタップすると、その日の予定リストが表示されます。</p>';
        }

        function clearAllData() {
            if (confirm('すべての登録データを完全に削除しますか？')) {
                localStorage.removeItem('juku_final_schedules');
                schedules = [];
                if (document.getElementById('page3').style.display === 'block') renderCalendar();
                alert('すべてのデータを完全にリセットしました。');
            }
        }
    </script>
</body>
</html>

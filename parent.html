<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>塾の予定管理・リアルタイム通知デモ（保護者画面）</title>
    <style>
        body { font-family: sans-serif; margin: 10px; background-color: #f0f4f8; display: flex; justify-content: center; align-items: center; min-height: 90vh; }
        ul { list-style-type: none; padding: 0; }
        li { background: #ecf0f1; margin: 8px 0; padding: 12px; border-radius: 4px; border-left: 5px solid #3498db; font-size: 0.9em; }
        select, input, button { padding: 10px; margin: 8px 0; width: 100%; box-sizing: border-box; border: 1px solid #ccc; border-radius: 4px; font-size: 1em; }
        button { background-color: #3498db; color: white; border: none; cursor: pointer; font-weight: bold; }
        button:hover { background-color: #2980b9; }
        label { font-size: 0.9em; color: #2c3e50; font-weight: bold; display: block; margin-top: 10px; }

        /* 保護者スマホ画面 */
        .parent-screen { background-color: #fffaf0; border: 4px solid #333; border-radius: 20px; padding: 20px; width: 100%; max-width: 360px; margin: 0 auto; box-shadow: 0 4px 10px rgba(0,0,0,0.2); position: relative; overflow: hidden; min-height: 520px; box-sizing: border-box; display: flex; flex-direction: column; }
        .parent-header { background-color: #ff9f43; color: white; padding: 10px; border-radius: 6px; text-align: center; font-weight: bold; margin-bottom: 15px; }
        .logout-btn { background-color: #7f8c8d; font-size: 0.8em; padding: 5px; margin-top: auto; width: 100%; }

        /* 表示切り替えタブ */
        .tab-container { display: flex; gap: 5px; margin-bottom: 10px; }
        .tab-btn { flex: 1; padding: 6px; font-size: 0.85em; background-color: #ddd; color: #333; border-radius: 4px; }
        .tab-btn.active { background-color: #3498db; color: white; }

        /* カレンダーのスタイル */
        .calendar-header { display: flex; justify-content: space-between; align-items: center; font-weight: bold; margin-bottom: 5px; font-size: 0.95em; color: #2c3e50; }
        .calendar-nav-btn { width: auto; padding: 2px 10px; margin: 0; background: #e0e0e0; color: #333; font-size: 0.8em; }
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; text-align: center; font-size: 0.8em; background: white; padding: 8px; border-radius: 8px; border: 1px solid #ddd; }
        .weekday { font-weight: bold; color: #7f8c8d; padding-bottom: 4px; }
        .sunday { color: #e74c3c; }
        .saturday { color: #3498db; }
        .calendar-day { padding: 6px 0; border-radius: 4px; cursor: pointer; position: relative; min-height: 28px; box-sizing: border-box; }
        .calendar-day:hover { background-color: #f0f0f0; }
        .calendar-day.has-event { font-weight: bold; color: #e67e22; }
        .calendar-day.has-event::after { content: '●'; font-size: 8px; position: absolute; bottom: 1px; left: 0; right: 0; color: #e67e22; text-align: center; }
        .calendar-day.selected { background-color: #ffeaa7; border: 1px solid #ts; }
        .calendar-day.empty { cursor: default; }
        .calendar-day.empty:hover { background: none; }

        /* 選択された日の詳細表示エリア */
        .day-detail-box { background: #fff; padding: 8px; margin-top: 8px; border-radius: 6px; border: 1px dashed #ff9f43; min-height: 50px; font-size: 0.85em; }

        /* 疑似プッシュ通知バナー */
        .push-notification {
            position: absolute; top: -80px; left: 10px; right: 10px;
            background: rgba(0, 0, 0, 0.85); color: white; padding: 10px 15px;
            border-radius: 12px; font-size: 0.85em; box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            transition: top 0.5s ease-in-out; z-index: 999; pointer-events: none;
        }
        .push-notification.show { top: 10px; }
        .push-icon { color: #ff9f43; font-weight: bold; margin-right: 5px; }
    </style>
</head>
<body>

    <div class="parent-screen">
        <!-- 疑似プッシュ通知バナー -->
        <div id="pushBanner" class="push-notification">
            <span class="push-icon">🔔 塾からのお知らせ:</span>
            <span id="pushMessage">通知内容</span>
        </div>

        <!-- ログイン画面 -->
        <div id="loginForm">
            <div class="parent-header">塾アプリ ログイン</div>
            
            <label for="studentSelect">お子様のお名前:</label>
            <select id="studentSelect">
                <option value="佐藤 拓海">佐藤 拓海 くん</option>
                <option value="鈴木 結衣">鈴木 結衣 さん</option>
                <option value="高橋 蓮">高橋 蓮 くん</option>
                <option value="田中 葵">田中 葵 さん</option>
                <option value="渡辺 翔太">渡辺 翔太 くん</option>
            </select>

            <label for="parentPassword">パスワード:</label>
            <input type="password" id="parentPassword" placeholder="パスワードを入力">
            
            <button onclick="checkLogin()" style="margin-top: 15px;">ログイン</button>
        </div>

        <!-- ログイン後のマイページ -->
        <div id="parentDashboard" style="display: none; flex-direction: column; flex-grow: 1;">
            <div class="parent-header" id="parentHeaderTitle">〇〇様のマイページ</div>
            
            <!-- カレンダーとリストの切り替えタブ -->
            <div class="tab-container">
                <button id="tabCal" class="tab-btn active" onclick="switchView('calendar')">📅 カレンダー表示</button>
                <button id="tabList" class="tab-btn" onclick="switchView('list')">📋 一覧リスト表示</button>
            </div>

            <!-- カレンダー表示エリア -->
            <div id="calendarView">
                <div class="calendar-header">
                    <button class="calendar-nav-btn" onclick="changeMonth(-1)">◀</button>
                    <span id="calendarMonthTitle">2026年06月</span>
                    <button class="calendar-nav-btn" onclick="changeMonth(1)">▶</button>
                </div>
                <div class="calendar-grid" id="calendarGrid">
                    <!-- 曜日と日付がJavaScriptで自動生成されます -->
                </div>
                <div class="day-detail-box" id="dayDetailBox">
                    <p style="color:#777; margin:5px 0;">日付をタップすると、その日の指導予定が表示されます。</p>
                </div>
            </div>

            <!-- 一覧リスト表示エリア -->
            <div id="listView" style="display: none;">
                <p style="font-weight:bold; color:#2c3e50; margin: 5px 0;">📅 全ての予定一覧</p>
                <ul id="parentScheduleList" style="max-height: 260px; overflow-y: auto;">
                    <!-- 予定がここに表示されます -->
                </ul>
            </div>

            <button class="logout-btn" onclick="logout()">ログアウト</button>
        </div>
    </div>

    <script>
        const userDatabase = {
            "sato123": { student: "佐藤 拓海", parent: "佐藤 美穂 さん" },
            "suzuki123": { student: "鈴木 結衣", parent: "鈴木 一郎 さん" },
            "takahashi123": { student: "高橋 蓮", parent: "高橋 恵子 さん" },
            "tanaka123": { student: "田中 葵", parent: "田中 健一 さん" },
            "watanabe123": { student: "渡辺 翔太", parent: "渡辺 真由美 さん" }
        };

        let loggedInUser = null;
        let schedules = [];
        let currentView = 'calendar'; // 'calendar' か 'list'
        
        // カレンダーコントロール用の現在表示年月 (初期値: 2026年6月)
        let currentYear = 2026;
        let currentMonth = 5; // 0が1月、5が6月

        function loadSchedules() {
            schedules = JSON.parse(localStorage.getItem('juku_final_schedules')) || [];
            if (loggedInUser) {
                displayParentSchedules();
                renderCalendar();
            }
        }
        setInterval(loadSchedules, 3000); // 3秒ごとに自動更新

        function checkLogin() {
            const selectedStudent = document.getElementById('studentSelect').value;
            const inputPass = document.getElementById('parentPassword').value;
            const userData = userDatabase[inputPass];
            
            if (userData && userData.student === selectedStudent) {
                loggedInUser = userData;
                document.getElementById('loginForm').style.display = 'none';
                document.getElementById('parentDashboard').style.display = 'flex';
                
                // ログイン時の日付ベースに合わせる
                const d = new Date();
                currentYear = d.getFullYear();
                currentMonth = d.getMonth();

                loadSchedules();
            } else {
                alert('お子様のお名前、またはパスワードが正しくありません。');
            }
            document.getElementById('parentPassword').value = '';
        }

        // 表示の切り替え
        function switchView(view) {
            currentView = view;
            if (view === 'calendar') {
                document.getElementById('calendarView').style.display = 'block';
                document.getElementById('listView').style.display = 'none';
                document.getElementById('tabCal').classList.add('active');
                document.getElementById('tabList').classList.remove('active');
            } else {
                document.getElementById('calendarView').style.display = 'none';
                document.getElementById('listView').style.display = 'block';
                document.getElementById('tabCal').classList.remove('active');
                document.getElementById('tabList').classList.add('active');
            }
        }

        // リスト形式の予定一覧を表示
        function displayParentSchedules() {
            const list = document.getElementById('parentScheduleList');
            document.getElementById('parentHeaderTitle').innerText = `${loggedInUser.parent} 専用`;
            
            let myChildSchedules = schedules.filter(item => item.student === loggedInUser.student);
            myChildSchedules.sort((a, b) => new Date(a.date) - new Date(b.date));

            const currentCount = list.getElementsByTagName('li').length;
            list.innerHTML = '';

            if (myChildSchedules.length === 0) {
                list.innerHTML = '<li>現在、登録されている予定はありません。</li>';
            } else {
                myChildSchedules.forEach(item => {
                    const li = document.createElement('li');
                    li.innerHTML = `<strong>📅 ${item.date}</strong><br>${item.text}`;
                    list.appendChild(li);
                });

                // 新着ポップアップ通知
                if (currentCount > 0 && myChildSchedules.length > currentCount) {
                    const latest = myChildSchedules[myChildSchedules.length - 1];
                    triggerPushNotification(`【新着】${latest.date}：${latest.text}`);
                }
            }
        }

        // カレンダーの生成
        function renderCalendar() {
            if (!loggedInUser) return;

            const grid = document.getElementById('calendarGrid');
            const monthTitle = document.getElementById('calendarMonthTitle');
            
            // タイトルの更新
            monthTitle.innerText = `${currentYear}年${String(currentMonth + 1).padStart(2, '0')}月`;
            
            grid.innerHTML = '';

            // 曜日ヘッダーの追加
            const weekdays = ['日', '月', '火', '水', '木', '金', '土'];
            weekdays.forEach((w, index) => {
                const div = document.createElement('div');
                div.className = 'weekday';
                if (index === 0) div.classList.add('sunday');
                if (index === 6) div.classList.add('saturday');
                div.innerText = w;
                grid.appendChild(div);
            });

            // 月の初日の曜日と総日数を計算
            const firstDayIndex = new Date(currentYear, currentMonth, 1).getDay();
            const totalDays = new Date(currentYear, currentMonth + 1, 0).getDate();

            // お子様用の予定だけを抽出
            let myChildSchedules = schedules.filter(item => item.student === loggedInUser.student);

            // 1日より前の空セル
            for (let i = 0; i < firstDayIndex; i++) {
                const div = document.createElement('div');
                div.className = 'calendar-day empty';
                grid.appendChild(div);
            }

            // 日付セルの生成
            for (let day = 1; day <= totalDays; day++) {
                const div = document.createElement('div');
                div.className = 'calendar-day';
                div.innerText = day;

                // 曜日ごとの色付け
                const currentDayOfWeek = new Date(currentYear, currentMonth, day).getDay();
                if (currentDayOfWeek === 0) div.classList.add('sunday');
                if (currentDayOfWeek === 6) div.classList.add('saturday');

                // フォーマット用文字列 (YYYY-MM-DD)
                const dateStr = `${currentYear}-${String(currentMonth + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
                
                // この日に予定があるかチェック
                const hasEvent = myChildSchedules.some(item => item.date === dateStr);
                if (hasEvent) {
                    div.classList.add('has-event');
                }

                // タップしたときの動作
                div.onclick = () => {
                    // 他の選択状態を解除
                    document.querySelectorAll('.calendar-day').forEach(el => el.classList.remove('selected'));
                    div.classList.add('selected');
                    showDayDetail(dateStr, day);
                };

                grid.appendChild(div);
            }
        }

        // 特定の日の詳細をカレンダーの下に表示
        function showDayDetail(dateStr, dayNum) {
            const detailBox = document.getElementById('dayDetailBox');
            let myChildSchedules = schedules.filter(item => item.student === loggedInUser.student && item.date === dateStr);

            if (myChildSchedules.length === 0) {
                detailBox.innerHTML = `<strong style="color:#555;">📅 ${currentMonth + 1}月${dayNum}日</strong><br><p style="margin:5px 0 0 0; color:#999;">予定はありません。</p>`;
            } else {
                let html = `<strong style="color:#e67e22;">📅 ${currentMonth + 1}月${dayNum}日の予定</strong><br><ul style="margin:5px 0 0 0; padding-left:0;">`;
                myChildSchedules.forEach(item => {
                    html += `<li style="background:#fff3e0; border-left:5px solid #ff9f43; margin:4px 0; padding:8px; list-style:none;">${item.text}</li>`;
                });
                html += '</ul>';
                detailBox.innerHTML = html;
            }
        }

        // 月の変更
        function changeMonth(direction) {
            currentMonth += direction;
            if (currentMonth > 11) {
                currentMonth = 0;
                currentYear += 1;
            } else if (currentMonth < 0) {
                currentMonth = 11;
                currentYear -= 1;
            }
            renderCalendar();
            document.getElementById('dayDetailBox').innerHTML = '<p style="color:#777; margin:5px 0;">日付をタップすると、その日の指導予定が表示されます。</p>';
        }

        // 疑似プッシュ通知
        function triggerPushNotification(message) {
            const banner = document.getElementById('pushBanner');
            const msgSpan = document.getElementById('pushMessage');
            msgSpan.innerText = message;
            banner.classList.add('show');
            setTimeout(() => banner.classList.remove('show'), 5000);
        }

        function logout() {
            loggedInUser = null;
            document.getElementById('loginForm').style.display = 'block';
            document.getElementById('parentDashboard').style.display = 'none';
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>塾の予定管理システム（保護者画面）</title>
    
    <!-- 🍎 iPhoneホーム画面用のウェブクリップアイコン設定 -->
    <link class="apple-touch-icon" rel="apple-touch-icon" href="apple-touch-icon.png">

    <style>
        body { font-family: sans-serif; margin: 20px; background-color: #f0f4f8; }
        h1 { color: #2c3e50; border-bottom: 2px solid #3498db; padding-bottom: 10px; margin-bottom: 20px; text-align: center; }
        
        .main-container { display: flex; flex-direction: column; gap: 20px; max-width: 600px; margin: 0 auto; }
        .box { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); box-sizing: border-box; }
        
        label { font-size: 0.9em; color: #2c3e50; font-weight: bold; display: block; margin-top: 12px; }
        select { padding: 10px; margin: 8px 0; width: 100%; box-sizing: border-box; border: 1px solid #ccc; border-radius: 4px; font-size: 1em; }

        .calendar-header { display: flex; justify-content: space-between; align-items: center; font-weight: bold; margin-bottom: 10px; margin-top: 15px; }
        .calendar-nav-btn { width: auto; padding: 6px 15px; margin: 0; background: #e0e0e0; color: #333; border: none; border-radius: 4px; cursor: pointer; }
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; text-align: center; font-size: 0.85em; background: #fafafa; padding: 8px; border-radius: 8px; border: 1px solid #ddd; }
        .weekday { font-weight: bold; color: #7f8c8d; padding-bottom: 6px; }
        .sunday { color: #e74c3c; }
        .saturday { color: #3498db; }
        .calendar-day { padding: 10px 0; border-radius: 4px; cursor: pointer; position: relative; min-height: 35px; }
        .calendar-day:hover { background-color: #e2e2e2; }
        .calendar-day.has-event::after { content: '●'; font-size: 9px; position: absolute; bottom: 2px; left: 0; right: 0; color: #2980b9; text-align: center; }
        .calendar-day.selected { background-color: #ffeaa7; border: 1px solid #f1c40f; }
        .calendar-day.empty { cursor: default; background: none !important; }
        
        .day-detail-box { background: #f8f9fa; padding: 15px; margin-top: 15px; border-radius: 6px; border: 1px dashed #3498db; min-height: 60px; font-size: 0.95em; }
        .detail-day-span.sun { color: #e74c3c; font-weight: bold; }
        .detail-day-span.sat { color: #3498db; font-weight: bold; }
        
        .urgent-banner { background-color: #ffeae6; border-left: 5px solid #e74c3c; padding: 12px; border-radius: 4px; margin-bottom: 15px; font-size: 0.9em; color: #333; }
        .urgent-banner h3 { margin: 0 0 5px 0; color: #e74c3c; font-size: 1.05em; display: flex; align-items: center; gap: 5px; }
    </style>
    <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore-compat.js"></script>
</head>
<body>

    <h1>塾・生徒予定確認システム（保護者画面）</h1>

    <div class="main-container">
        
        <!-- 緊急連絡の表示エリア（最新の緊急連絡があれば自動表示） -->
        <div id="urgentNoticeArea" style="display: none;"></div>

        <div class="box">
            <h2>📅 お子様の予定カレンダー</h2>
            
            <label>確認するお子様を選択してください:</label>
            <select id="studentFilter" onchange="renderCalendar()">
                <option value="佐藤 拓海">佐藤 拓海 くん</option>
                <option value="鈴木 結衣">鈴木 結衣 さん</option>
                <option value="高橋 蓮">高橋 蓮 くん</option>
                <option value="田中 葵">田中 葵 さん</option>
                <option value="渡辺 翔太">渡辺 翔太 くん</option>
            </select>

            <div class="calendar-header">
                <button class="calendar-nav-btn" onclick="changeMonth(-1)">◀ 前月</button>
                <span id="calendarMonthTitle">2026年06月</span>
                <button class="calendar-nav-btn" onclick="changeMonth(1)">次月 ▶</button>
            </div>
            
            <div class="calendar-grid" id="calendarGrid"></div>
            
            <div class="day-detail-box" id="dayDetailBox">
                <p style="color:#777; margin:5px 0; text-align: center;">日付をタップすると、その日の予定が表示されます。</p>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCvsoHNZ_XcrSMB1ZQp0MZEjaQ9_4twiZK",
            authDomain: "juku-manage-dba.firebaseapp.com",
            projectId: "juku-manage-dba",
            storageBucket: "juku-manage-dba.firebasestorage.app",
            messagingSenderId: "28426983865",
            appId: "1:28426983865:web:252cd63d7f1b1cc3eb7e68"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        
        let schedules = [];
        let currentYear = 2026;
        let currentMonth = 5; // 6月 (0ベース)

        // リアルタイムでデータを取得
        db.collection("schedules").orderBy("createdAt", "desc").onSnapshot((snapshot) => {
            schedules = [];
            snapshot.forEach((doc) => {
                let data = doc.data();
                data.id = doc.id;
                schedules.push(data);
            });

            checkUrgentNotices();
            renderCalendar();
        });

        // 緊急連絡のチェックと表示
        function checkUrgentNotices() {
            const currentStudent = document.getElementById('studentFilter').value;
            const noticeArea = document.getElementById('urgentNoticeArea');
            
            // 全員向け、または選択中のお子様向けの最新の緊急連絡を抽出
            const urgentEvents = schedules.filter(item => {
                return item.type === 'urgent' && (item.student === '全員' || item.student === currentStudent);
            });

            if (urgentEvents.length > 0) {
                const latest = urgentEvents[0]; // 一番新しい緊急連絡
                noticeArea.innerHTML = `
                    <div class="urgent-banner">
                        <h3>🚨 塾からの緊急連絡</h3>
                        <strong>対象: ${latest.student === '全員' ? '全員一斉連絡' : latest.student + ' くん/さん'}</strong><br>
                        ${latest.text.replace('🚨【緊急連絡】', '')}
                    </div>
                `;
                noticeArea.style.display = 'block';
            } else {
                noticeArea.style.display = 'none';
            }
        }

        function renderCalendar() {
            const grid = document.getElementById('calendarGrid');
            const monthTitle = document.getElementById('calendarMonthTitle');
            const filter = document.getElementById('studentFilter').value;
            
            monthTitle.innerText = `${currentYear}年${String(currentMonth + 1).padStart(2, '0')}月`;
            grid.innerHTML = '';

            // 曜日ヘッダー
            const weekdaysJa = ['日', '月', '火', '水', '木', '金', '土'];
            weekdaysJa.forEach((w, idx) => {
                const div = document.createElement('div');
                div.className = `weekday ${idx===0?'sunday':''} ${idx===6?'saturday':''}`;
                div.innerText = w; 
                grid.appendChild(div);
            });

            const firstDay = new Date(currentYear, currentMonth, 1).getDay();
            const totalDays = new Date(currentYear, currentMonth + 1, 0).getDate();

            // 空白埋め
            for (let i = 0; i < firstDay; i++) {
                const div = document.createElement('div'); 
                div.className = 'calendar-day empty'; 
                grid.appendChild(div);
            }

            // 日付埋め
            for (let day = 1; day <= totalDays; day++) {
                const div = document.createElement('div');
                div.className = 'calendar-day'; 
                div.innerText = day;
                
                const dayOfWeek = new Date(currentYear, currentMonth, day).getDay();
                if (dayOfWeek === 0) div.classList.add('sunday');
                if (dayOfWeek === 6) div.classList.add('saturday');

                const formattedDate = `${currentYear}-${String(currentMonth + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
                
                // 授業予定（normal）があるかチェック
                let hasNormalEvent = schedules.some(item => {
                    return item.date === formattedDate && item.type === 'normal' && item.student === filter;
                });

                if (hasNormalEvent) div.classList.add('has-event');

                div.onclick = () => {
                    document.querySelectorAll('.calendar-day').forEach(el => el.classList.remove('selected'));
                    div.classList.add('selected');
                    showDayDetail(formattedDate, day, filter);
                };
                grid.appendChild(div);
            }
            
            checkUrgentNotices(); // 生徒切り替え時にも緊急連絡を再チェック
        }

        function showDayDetail(dateStr, dayNum, filter) {
            const detailBox = document.getElementById('dayDetailBox');
            let targetEvents = schedules.filter(item => {
                return item.date === dateStr && item.type === 'normal' && item.student === filter;
            });

            const weekdaysJa = ['日', '月', '火', '水', '木', '金', '土'];
            const dateObj = new Date(dateStr);
            const dayIdx = dateObj.getDay();
            let dayColorClass = '';
            if (dayIdx === 0) dayColorClass = 'sun';
            if (dayIdx === 6) dayColorClass = 'sat';

            const dateWithDayHtml = `${currentMonth + 1}月${dayNum}日<span class="detail-day-span ${dayColorClass}">（${weekdaysJa[dayIdx]}）</span>`;

            if (targetEvents.length === 0) {
                detailBox.innerHTML = `<strong>📅 ${dateWithDayHtml}</strong><br><p style="color:#999; margin:5px 0;">この日の授業予定はありません。</p>`;
            } else {
                let html = `<strong>📅 ${dateWithDayHtml}の授業予定</strong><ul style="margin:5px 0 0 0; padding-left:0;">`;
                targetEvents.forEach(item => {
                    html += `<li style="background:#e8f4fd; border-left:5px solid #3498db; margin:4px 0; padding:8px; list-style:none; font-size:0.95em;">${item.text.split('｜')[0]}</li>`;
                    // 連絡事項があればそれも表示
                    if(item.text.includes('｜ 連絡:')) {
                        const memo = item.text.split('｜ 連絡:')[1];
                        html += `<div style="font-size:0.85em; color:#555; margin-left:10px; margin-bottom:8px;">💡 連絡事項: ${memo}</div>`;
                    }
                });
                html += '</ul>';
                detailBox.innerHTML = html;
            }
        }

        function changeMonth(dir) {
            currentMonth += dir;
            if (currentMonth > 11) { currentMonth = 0; currentYear += 1; }
            else if (currentMonth < 0) { currentMonth = 11; currentYear -= 1; }
            renderCalendar();
            // 月を切り替えたら詳細ボックスをリセット
            document.getElementById('dayDetailBox').innerHTML = '<p style="color:#777; margin:5px 0; text-align: center;">日付をタップすると、その日の予定が表示されます。</p>';
        }

        window.onload = function() {
            // 初期表示を本日の日付に合わせる
            const today = new Date();
            currentYear = today.getFullYear();
            currentMonth = today.getMonth();
            renderCalendar();
        };
    </script>
</body>
</html>

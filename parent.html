<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>えんごかい ＷＥＢ</title>
    <style>
        body { font-family: sans-serif; margin: 0; background-color: #f5f6fa; color: #2f3640; padding: 15px; }
        .phone-wrapper { max-width: 450px; margin: 0 auto; background: white; min-height: 90vh; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.08); padding: 20px; box-sizing: border-box; }
        
        h1 { font-size: 1.3em; color: #2c3e50; border-bottom: 2px solid #3498db; padding-bottom: 8px; margin-top: 0; text-align: center; }
        h2 { font-size: 1.1em; color: #2c3e50; margin-top: 20px; border-left: 4px solid #3498db; padding-left: 8px; }
        
        /* 🔒 ログイン画面 */
        .login-box { text-align: center; padding-top: 40px; }
        input, button { width: 100%; padding: 12px; margin: 8px 0; box-sizing: border-box; border: 1px solid #ccc; border-radius: 6px; font-size: 1em; }
        button { background-color: #3498db; color: white; border: none; font-weight: bold; cursor: pointer; }
        button:hover { background-color: #2980b9; }
        .error-msg { color: #e74c3c; font-size: 0.9em; display: none; margin-top: 5px; }

        /* 📱 メインコンテンツ */
        #mainContent { display: none; }
        .welcome-msg { background: #e8f4fd; padding: 12px; border-radius: 6px; font-size: 0.9em; font-weight: bold; margin-bottom: 15px; line-height: 1.4; }
        .logout-link { text-align: right; margin-bottom: 15px; font-size: 0.85em; }
        .logout-link a { color: #7f8c8d; text-decoration: underline; cursor: pointer; }

        /* 🚨 緊急連絡アラート */
        .urgent-alert-area { display: none; margin-bottom: 20px; }
        .urgent-card { background: #ffeae6; border: 2px solid #e74c3c; border-radius: 8px; padding: 12px; color: #c0392b; font-size: 0.9em; margin-bottom: 8px; }
        .urgent-card strong { font-size: 1.05em; display: block; margin-bottom: 4px; }

        /* 📅 カレンダー */
        .calendar-header { display: flex; justify-content: space-between; align-items: center; font-weight: bold; margin: 10px 0; font-size: 0.95em; }
        .calendar-nav-btn { width: auto; padding: 4px 12px; margin: 0; background: #e0e0e0; color: #333; font-size: 0.9em; }
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; text-align: center; font-size: 0.8em; background: #fafafa; padding: 6px; border-radius: 8px; border: 1px solid #ddd; }
        .weekday { font-weight: bold; color: #7f8c8d; padding-bottom: 4px; }
        .sunday { color: #e74c3c; }
        .saturday { color: #3498db; }
        .calendar-day { padding: 10px 0; border-radius: 4px; cursor: pointer; position: relative; min-height: 30px; }
        .calendar-day:hover { background-color: #e2e2e2; }
        .calendar-day.has-event::after { content: '●'; font-size: 8px; position: absolute; bottom: 1px; left: 0; right: 0; color: #2980b9; text-align: center; }
        .calendar-day.selected { background-color: #ffeaa7; border: 1px solid #f1c40f; }
        .calendar-day.empty { cursor: default; background: none !important; }
        
        .day-detail-box { background: #f8f9fa; padding: 12px; margin-top: 10px; border-radius: 6px; border: 1px dashed #3498db; min-height: 40px; font-size: 0.9em; }

        .dot-blue::after { color: #3498db !important; }
.dot-red::after { color: #e74c3c !important; }
.dot-green::after { color: #2ecc71 !important; }

        /* ⚙️ パスワード変更エリア */
        .settings-box { background: #f8f9fa; padding: 15px; border-radius: 8px; border: 1px solid #e0e0e0; margin-top: 25px; }
        .settings-box h3 { margin-top: 0; font-size: 1em; color: #2c3e50; }
        .settings-box input { background: white; padding: 8px; font-size: 0.9em; }
        .settings-box button { background: #2ecc71; padding: 10px; font-size: 0.9em; margin-top: 5px; }
        .settings-box button:hover { background: #27ae60; }
    </style>
    
    <!-- Firebase SDK (塾長画面と同一バージョン) -->
    <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-auth-compat.js"></script>
</head>
<body>

    <div class="phone-wrapper">
        <!-- 🔒 ログイン画面の該当部分 -->
<div id="loginArea" class="login-box">
    <h1>えんごばと<br><span style="font-size:0.7em; color:#7f8c8d; font-weight:normal;">保護者専用マイページ</span></h1>
    <p style="font-size:0.85em; color:#555; text-align:left; margin-top:25px;">塾から配布された登録カードの情報を入力してください。</p>
    <input type="email" id="loginEmail" placeholder="メールアドレス（ユーザーID）" required>
    
    <!-- ここからパスワード表示ボタン付きの構成に変更 -->
    <div style="position: relative; display: flex; align-items: center;">
        <input type="password" id="loginPassword" placeholder="パスワード" required style="width: 100%; padding-right: 40px;">
        <button type="button" onclick="togglePasswordVisibility()" 
                style="position: absolute; right: 5px; background: none; border: none; cursor: pointer; font-size: 1.2em;">👁️</button>
    </div>
    <!-- ここまで -->

    <button onclick="handleLogin()">ログイン</button>
    <div id="loginError" class="error-msg">サインインに失敗しました。メールアドレスとパスワードを確認してください。</div>
</div>

        <!-- 📱 メイン画面（ログイン後に表示） -->
        <div id="mainContent">
            <div class="logout-link">
                <a onclick="handleLogout()">🚪 ログアウト</a>
            </div>
            
            <div class="welcome-msg" id="welcomeMessage">
                読み込み中...
            </div>

            <!-- 🚨 【リアルタイム受信用】緊急連絡エリア -->
            <div id="urgentAlertArea" class="urgent-alert-area">
                <h2 style="color:#e74c3c; border-left-color:#e74c3c; margin-top:0;">🚨 塾からの緊急連絡</h2>
                <div id="urgentCardContainer"></div>
            </div>

            <!-- タブボタン -->
<div style="display: flex; gap: 5px; margin-bottom: 10px;">
    <button onclick="switchTab('student')" style="background:#3498db; flex:1;">お子様の予定</button>
    <button onclick="switchTab('news')" style="background:#e74c3c; flex:1;">お知らせ</button>
    <button onclick="switchTab('study')" style="background:#2ecc71; flex:1;">自習室</button>
</div>

<!-- カレンダーのIDをタブごとに変えるためにここを修正 -->
<div id="calendarArea">
    <div class="calendar-header">
        <button class="calendar-nav-btn" onclick="changeMonth(-1)">◀</button>
        <span id="calendarMonthTitle">2026年06月</span>
        <button class="calendar-nav-btn" onclick="changeMonth(1)">▶</button>
    </div>
    <div class="calendar-grid" id="calendarGrid"></div>
    <div class="day-detail-box" id="dayDetailBox">タップした日付の内容がここに表示されます。</div>
</div>
            
            <!-- 📅 スケジュールカレンダーエリア -->
            <h2>📅 授業・面談予定スケジュール</h2>
            <div class="calendar-header">
                <button class="calendar-nav-btn" onclick="changeMonth(-1)">◀</button>
                <span id="calendarMonthTitle">2026年06月</span>
                <button class="calendar-nav-btn" onclick="changeMonth(1)">▶</button>
            </div>
            <div class="calendar-grid" id="calendarGrid"></div>
            <div class="day-detail-box" id="dayDetailBox">タップした日付の予定がここに表示されます。</div>

            <!-- ⚙️ パスワード変更セキュリティエリア -->
            <div class="settings-box">
                <h3>🔒 セキュリティ設定</h3>
                <p style="font-size:0.75em; color:#666; margin: 0 0 8px 0;">パスワードを変更できます。変更すると自動的に塾側の管理マスタも更新されます。</p>
                <input type="password" id="newPassword" placeholder="新しいパスワード（6文字以上）">
                <button onclick="updatePassword()">パスワードを更新する</button>
            </div>
        </div>
    </div>

    <script>
        // 塾長画面と完全に一致させるFirebase設定
        const firebaseConfig = {
            apiKey: "AIzaSyCvsoHNZ_XcRsMB1ZQp0MZEjaQ9_4twIZk", 
            authDomain: "juku-manage-dba.firebaseapp.com",
            projectId: "juku-manage-dba",
            storageBucket: "juku-manage-dba.firebasestorage.app",
            messagingSenderId: "28426983865",
            appId: "1:28426983865:web:252cd63d7f1b1cc3eb7e68"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();

        let currentProfile = null;      // ログイン中世帯のデータマスタ
        let currentStudentKey = null;   // 塾長側マスタのドキュメント名（例: "佐藤 拓海"）
        let allSchedules = [];          // 受信した全予定
        let currentYear = 2026;
        let currentMonth = 5; // 6月

        // 🔐 認証状態のリアルタイム監視
        auth.onAuthStateChanged((user) => {
            if (user) {
                // ログインしたユーザーのメールアドレスを元に、クラウドのマスタを検索
                fetchParentProfile(user.email);
            } else {
                document.getElementById("loginArea").style.display = "block";
                document.getElementById("mainContent").style.display = "none";
            }
        });

        // 👥 メールアドレスから紐づく世帯マスタを取得
        function fetchParentProfile(email) {
            db.collection("parents").where("email", "==", email).get().then((snapshot) => {
                if (snapshot.empty) {
                    alert("認証は成功しましたが、塾側の名簿データにこのアドレスが見つかりません。");
                    auth.signOut();
                    return;
                }
                
                // ドキュメントを取得
                const doc = snapshot.docs[0];
                currentStudentKey = doc.id; 
                currentProfile = doc.data();

                // 画面初期化
                document.getElementById("loginArea").style.display = "none";
                document.getElementById("mainContent").style.display = "block";
                
                // ウェルカムメッセージ生成
                let studentsDisplay = currentProfile.student1;
                if(currentProfile.student2 && currentProfile.student2 !== "—") studentsDisplay += `・${currentProfile.student2}`;
                if(currentProfile.student3 && currentProfile.student3 !== "—") studentsDisplay += `・${currentProfile.student3}`;
                
                document.getElementById("welcomeMessage").innerHTML = `
                    👤 <strong>${currentProfile.parentName} 様 マイページ</strong><br>
                    🎓 対象生徒: ${studentsDisplay}
                `;

                // 連携状態が「未連携」なら自動で「連携済み」に更新（最終確認日もセット）
                const today = new Date();
                const todayStr = `${String(today.getMonth()+1).padStart(2,'0')}/${String(today.getDate()).padStart(2,'0')}`;
                if (currentProfile.status !== "連携済み" || currentProfile.lastCheck !== todayStr) {
                    db.collection("parents").doc(currentStudentKey).update({
                        status: "連携済み",
                        lastCheck: todayStr
                    });
                }

                // カレンダーおよび緊急連絡のリアルタイム監視を開始
                startWatchSchedules();

            }).catch(err => {
                alert("プロファイルの取得に失敗しました: " + err.message);
            });
        }

        // 🔄 我が子に関係するスケジュールと緊急連絡だけをリアルタイムに監視
        function startWatchSchedules() {
            db.collection("schedules").orderBy("createdAt", "desc").onSnapshot((snapshot) => {
                allSchedules = [];
                const urgentContainer = document.getElementById("urgentCardContainer");
                const urgentArea = document.getElementById("urgentAlertArea");
                
                urgentContainer.innerHTML = "";
                let hasUrgent = false;

                snapshot.forEach((doc) => {
                    const item = doc.data();
                    
                    // 「全員宛て」または「この世帯の生徒キー名宛て」のデータのみに絞り込む（部外者ブロック）
                    if (item.student === "全員" || item.student === currentStudentKey) {
                        allSchedules.push(item);

                        // 緊急連絡タイプであれば、画面最上部にアラート表示
                        if (item.type === "urgent") {
                            hasUrgent = true;
                            const urgentCard = `
                                <div class="urgent-card">
                                    <strong>${item.text.split('：')[0]}</strong>
                                    ${item.text.split('：')[1] || ''}
                                    <div style="text-align:right; font-size:0.8em; color:#7f8c8d; margin-top:5px;">日付: ${item.date}</div>
                                </div>
                            `;
                            urgentContainer.insertAdjacentHTML('beforeend', urgentCard);
                        }
                    }
                });

                urgentArea.style.display = hasUrgent ? "block" : "none";
                renderCalendar();
            });
        }

        // 🔑 ログイン処理
        function handleLogin() {
            const email = document.getElementById("loginEmail").value.trim();
            const password = document.getElementById("loginPassword").value;
            const errorDiv = document.getElementById("loginError");
            errorDiv.style.display = "none";

            auth.signInWithEmailAndPassword(email, password).catch((error) => {
                errorDiv.style.display = "block";
            });
        }

        // 🚪 ログアウト処理
        function handleLogout() {
            if (confirm("ログアウトしますか？")) {
                auth.signOut().then(() => { window.location.reload(); });
            }
        }

        // 🔒 パスワードの自発的更新（Firebase Auth と Firestoreの同時同期書き換え）
        function updatePassword() {
            const newPass = document.getElementById("newPassword").value;
            if (newPass.length < 6) {
                alert("⚠ パスワードはセキュリティのため6文字以上で入力してください。");
                return;
            }

            const user = auth.currentUser;
            if (!user) return;

            // 1. Firebase Authentication上の認証パスワードを更新
            user.updatePassword(newPass).then(() => {
                // 2. 成功したら、塾長が見る名簿マスタ（Firestore）のパスワード表示も同期して書き換える
                return db.collection("parents").doc(currentStudentKey).update({
                    pass: newPass
                });
            }).then(() => {
                alert("🔒 パスワードを安全に更新しました。次回のログインからは新しいパスワードをご利用ください。塾長側の管理画面にも即時同期されました。");
                document.getElementById("newPassword").value = "";
            }).catch((error) => {
                alert("パスワードの更新に失敗しました（最近ログインしていない場合、再ログインを求められることがあります）: " + error.message);
            });
        }

        // 【関数の外に置く】現在のタブを保持
let activeTab = 'student'; 

function switchTab(tab) {
    activeTab = tab;
    renderCalendar(); // タブを変えたら再描画
}

// 📅 カレンダー描画ロジック
function renderCalendar() {
    const grid = document.getElementById('calendarGrid');
    const monthTitle = document.getElementById('calendarMonthTitle');
    
    monthTitle.innerText = `${currentYear}年${String(currentMonth + 1).padStart(2, '0')}月`;
    grid.innerHTML = '';

    // ... (曜日ヘッダー描画はそのまま) ...
    const weekdaysJa = ['日', '月', '火', '水', '木', '金', '土'];
    weekdaysJa.forEach((w, idx) => {
        const div = document.createElement('div');
        div.className = `weekday ${idx===0?'sunday':''} ${idx===6?'saturday':''}`;
        div.innerText = w; grid.appendChild(div);
    });

    const firstDay = new Date(currentYear, currentMonth, 1).getDay();
    const totalDays = new Date(currentYear, currentMonth + 1, 0).getDate();

    for (let i = 0; i < firstDay; i++) {
        const div = document.createElement('div'); div.className = 'calendar-day empty'; grid.appendChild(div);
    }

    for (let day = 1; day <= totalDays; day++) {
        const div = document.createElement('div'); div.className = 'calendar-day'; div.innerText = day;
        const formattedDateStr = `${currentYear}-${String(currentMonth + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
        
        // 【重要】現在アクティブなタブのデータだけを抽出
        let targetEvents = allSchedules.filter(item => 
            item.date === formattedDateStr && (item.type || 'student') === activeTab
        );

        if (targetEvents.length > 0) {
            div.classList.add('has-event');
            // タブに応じた色クラスを付与
            if(activeTab === 'student') div.classList.add('dot-blue');
            if(activeTab === 'news')    div.classList.add('dot-red');
            if(activeTab === 'study')   div.classList.add('dot-green');
        }
        
        div.onclick = () => {
            document.querySelectorAll('.calendar-day').forEach(el => el.classList.remove('selected'));
            div.classList.add('selected');
            showDayDetail(formattedDateStr, day);
        };
        grid.appendChild(div);
    }
}

        function showDayDetail(dateStr, dayNum) {
            const detailBox = document.getElementById('dayDetailBox');
            let targetEvents = allSchedules.filter(item => item.date === dateStr);
            const weekdaysJa = ['日', '月', '火', '水', '木', '金', '土'];
            const dayIdx = new Date(dateStr).getDay();
            
            let html = `<strong>📅 ${currentMonth + 1}月${dayNum}日の予定</strong>`;
            if (targetEvents.length === 0) {
                html += `<p style="color:#999; margin:5px 0;">予定はありません。</p>`;
            } else {
                html += `<ul style="margin:5px 0 0 0; padding-left:0; list-style:none;">`;
                targetEvents.forEach(item => {
                    const isUrgent = item.type === 'urgent';
                    const displayText = isUrgent ? item.text.replace('🚨【緊急】', '🚨 ') : item.text;
                    html += `
                        <li style="background:${isUrgent ? '#ffeae6' : '#e8f4fd'}; border-left:4px solid ${isUrgent ? '#e74c3c' : '#3498db'}; margin:6px 0; padding:8px; border-radius:4px; font-size:0.9em; line-height:1.4;">
                            ${displayText}
                        </li>`;
                });
                html += '</ul>';
            }
            detailBox.innerHTML = html;
        }

        function changeMonth(dir) {
            currentMonth += dir;
            if (currentMonth > 11) { currentMonth = 0; currentYear += 1; }
            else if (currentMonth < 0) { currentMonth = 11; currentYear -= 1; }
            renderCalendar();
        }

        // パスワード表示切替の関数
function togglePasswordVisibility() {
    const passwordField = document.getElementById("loginPassword");
    if (passwordField.type === "password") {
        passwordField.type = "text";
    } else {
        passwordField.type = "password";
    }
}

    </script>
</body>
</html>
